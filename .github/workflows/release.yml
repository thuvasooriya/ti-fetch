name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build release artifacts
        run: |
          mkdir -p release
          bun run build:linux-x64
          bun run build:linux-arm64
          bun run build:darwin-x64
          bun run build:darwin-arm64
          bun run build:windows-x64
          bun run build:windows-arm64
          bun run build:bundle

          cp dist/ti-fetch release/ti-fetch
          tar -czvf release/ti-fetch-linux-x64.tar.gz -C dist ti-fetch-linux-x64
          tar -czvf release/ti-fetch-linux-arm64.tar.gz -C dist ti-fetch-linux-arm64
          tar -czvf release/ti-fetch-darwin-x64.tar.gz -C dist ti-fetch-darwin-x64
          tar -czvf release/ti-fetch-darwin-arm64.tar.gz -C dist ti-fetch-darwin-arm64
          zip -j release/ti-fetch-windows-x64.zip dist/ti-fetch-windows-x64.exe
          zip -j release/ti-fetch-windows-arm64.zip dist/ti-fetch-windows-arm64.exe
          (cd release && sha256sum * > checksums.txt)
      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
